apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  labels:
    app: ai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
        - name: ai-backend
          image: DOCKER_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8000
          env:
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: ai-backend-secrets
                  key: DB_CONNECTION_STRING
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-backend-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-backend-secrets
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-backend-secrets
                  key: ANTHROPIC_BASE_URL
                  optional: true
      imagePullSecrets:
        - name: acr-auth
