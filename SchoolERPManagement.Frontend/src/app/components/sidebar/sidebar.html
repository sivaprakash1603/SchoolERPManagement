<aside class="sidebar-wrapper d-flex flex-column flex-shrink-0 p-4">
  <div class="mb-5 mt-2">
    <h3 class="fw-bold mb-0" style="color: var(--primary-accent);">EduControl</h3>
    <small class="text-muted-custom" style="font-size: 0.75rem;">Institutional ERP</small>
  </div>
  
  <ul class="nav flex-column mb-auto sidebar-nav pe-2">
    @for (item of menuItems; track item.route) {
      <li class="nav-item">
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3 py-2 px-3 sans-text text-decoration-none">
          <i class="bi {{ item.icon }} fs-5"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</aside>
