<div class="chatbot-container p-4">
  <div class="chatbot-card d-flex flex-column mx-auto">
    <!-- Header -->
    <div class="chatbot-header p-4 d-flex align-items-center gap-3">
      <div class="avatar-circle pulse-animation">
        <i class="bi bi-robot fs-4"></i>
      </div>
      <div>
        <h4 class="mb-0 fw-bold text-white">EduControl AI</h4>
        <small class="text-white-50"><i class="bi bi-circle-fill text-success me-1" style="font-size: 8px;"></i>Online | Ready to help</small>
      </div>
    </div>

    <!-- Chat Body -->
    <div class="chatbot-body p-4 flex-grow-1 overflow-auto d-flex flex-column gap-3" #chatScroll>
      @for (msg of messages; track $index) {
        <div class="chat-message-wrapper" [ngClass]="{'user-wrapper': msg.sender === 'user', 'bot-wrapper': msg.sender === 'bot'}" @messageAnimation>
          <div class="chat-bubble shadow-sm" [ngClass]="{'user-bubble': msg.sender === 'user', 'bot-bubble': msg.sender === 'bot'}">
            <p class="mb-0 text-break" style="white-space: pre-wrap;">{{ msg.text }}</p>
          </div>
          <small class="timestamp mt-1">{{ msg.timestamp | date:'shortTime' }}</small>
        </div>
      }

      @if (isTyping) {
        <div class="chat-message-wrapper bot-wrapper" @messageAnimation>
          <div class="chat-bubble bot-bubble shadow-sm typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      }
    </div>

    <!-- Footer / Input -->
    <div class="chatbot-footer p-3 bg-white border-top">
      @if (messages.length === 1 && !isTyping) {
        <div class="suggestions-container mb-3 d-flex flex-wrap gap-2 px-1" @messageAnimation>
          @for (sug of suggestedQuestions; track $index) {
            <button class="btn btn-outline-primary rounded-pill btn-sm suggestion-btn" (click)="sendSuggestion(sug)">
              {{ sug }}
            </button>
          }
        </div>
      }
      <form class="d-flex align-items-center gap-2" (ngSubmit)="sendMessage()">
        <input 
          type="text" 
          class="form-control rounded-pill px-4 py-2 chat-input" 
          placeholder="Type your message here..." 
          name="queryInput"
          [(ngModel)]="currentInput"
          autocomplete="off"
          [disabled]="isTyping">
        <button type="submit" class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center shadow-sm send-btn" [disabled]="!currentInput.trim() || isTyping">
          <i class="bi bi-send-fill fs-5"></i>
        </button>
      </form>
    </div>
  </div>
</div>
