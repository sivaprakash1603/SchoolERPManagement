<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 px-4 border-top mt-auto" style="background-color: var(--bg-main); border-color: var(--border-color) !important;">
  <div class="col-md-6 d-flex align-items-center">
    <span class="small fw-medium" style="color: var(--text-secondary); font-size: 0.75rem;">&copy; {{ year }} EduControl &middot; School ERP System</span>
  </div>
  <div class="col-md-6 d-flex justify-content-md-end align-items-center">
    <a [routerLink]="['/faq']" class="small fw-bold text-decoration-none" style="color: var(--primary-accent); font-size: 0.75rem; transition: opacity 0.2s/ease;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">FAQ & Help</a>
  </div>
</footer>
