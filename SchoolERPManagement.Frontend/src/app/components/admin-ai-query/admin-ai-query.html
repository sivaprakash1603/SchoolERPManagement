<div class="ai-insights-container p-4 d-flex align-items-center justify-content-center">
  <div class="search-card text-center shadow-lg p-5 rounded-4">
    <div class="mb-4">
      <div class="icon-circle mx-auto mb-3">
        <i class="bi bi-magic fs-1 text-primary"></i>
      </div>
      <h2 class="fw-bold mb-2">Data Insights AI</h2>
      <p class="text-muted-custom">Ask any natural language question about your school data, and get an instant Excel report.</p>
    </div>

    <form (ngSubmit)="executeSearch()" class="search-form position-relative mx-auto mb-4">
      <input 
        type="text" 
        class="form-control form-control-lg rounded-pill shadow-sm ai-search-input pe-5" 
        placeholder="E.g., How many students are enrolled in 10th grade?"
        [(ngModel)]="searchQuery"
        name="aiQuery"
        [disabled]="isSearching"
        autocomplete="off"
      >
      <button type="submit" class="btn btn-primary rounded-circle ai-search-btn shadow-sm" [disabled]="!searchQuery.trim() || isSearching">
        @if (isSearching) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        } @else {
          <i class="bi bi-search"></i>
        }
      </button>
    </form>

    @if (isSearching) {
      <div class="loading-state my-4">
        <div class="pulse-ring mx-auto mb-3"></div>
        <p class="text-primary fw-medium mb-0 loading-text">Analyzing database and generating report...</p>
        <small class="text-muted">This may take a few moments</small>
      </div>
    } @else {
      <div class="suggestions-area mt-5">
        <h6 class="text-muted text-uppercase fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 0.05em;">Try asking:</h6>
        <div class="d-flex flex-wrap justify-content-center gap-2">
          @for (sug of suggestedQueries; track $index) {
            <button type="button" class="btn btn-light rounded-pill suggestion-badge" (click)="setQuery(sug)">
              {{ sug }}
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
