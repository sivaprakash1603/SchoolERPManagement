<div class="d-flex w-100 layout-wrapper position-relative">
  <!-- Mobile Sidebar Backdrop -->
  @if (layoutService.isSidebarOpen()) {
    <div class="sidebar-backdrop d-md-none" (click)="layoutService.closeSidebar()"></div>
  }

  <!-- Sidebar Container -->
  <div class="sidebar-container" [class.open]="layoutService.isSidebarOpen()">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Main Content Area -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden position-relative w-100">
    <app-header></app-header>
    
    <main class="flex-grow-1 overflow-auto p-2 p-md-4" style="background-color: var(--bg-canvas);">
      <div class="container-fluid py-2 px-0 px-md-3 position-relative" [@routeAnimation]="getRouteAnimationData()">
        <router-outlet></router-outlet>
      </div>
    </main>

    <app-footer></app-footer>
  </div>

  <!-- Toasts Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    @for (toast of toastService.toasts(); track toast.id) {
      <div class="toast show align-items-center mb-2 p-2 d-flex border" 
           style="border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.3s ease;"
           [style.background-color]="toast.type === 'success' ? 'var(--color-success)' : toast.type === 'danger' ? 'var(--color-error)' : toast.type === 'info' ? 'var(--color-info)' : '#fef3c7'"
           [style.border-color]="toast.type === 'warning' ? '#fde047' : 'transparent'"
           [style.color]="toast.type === 'warning' ? '#854d0e' : '#fff'"
           role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex w-100 align-items-center justify-content-between">
          <div class="toast-body d-flex align-items-center gap-2 fw-semibold px-2" style="font-size: 0.875rem;">
            @if (toast.type === 'success') { <i class="bi bi-check-circle-fill fs-5"></i> }
            @if (toast.type === 'danger') { <i class="bi bi-exclamation-octagon-fill fs-5"></i> }
            @if (toast.type === 'warning') { <i class="bi bi-exclamation-triangle-fill fs-5" style="color: #b45309;"></i> }
            @if (toast.type === 'info') { <i class="bi bi-info-circle-fill fs-5"></i> }
            {{ toast.message }}
          </div>
          <button type="button" class="btn-close me-2 m-auto" [class.btn-close-white]="toast.type !== 'warning'" (click)="toastService.remove(toast.id)" aria-label="Close"></button>
        </div>
      </div>
    }
  </div>
</div>
